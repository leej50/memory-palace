<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Memoria — Mind Palace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #ebe3d3;
    --ink-dim: #a39882;
    --ink-faint: #6a6354;
    --paper: #1a1611;
    --paper-deep: #0d0b07;
    --ember: #d4824a;
    --ember-bright: #f5b97a;
    --gold: #c9a961;
    --rust: #8a3f23;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--paper-deep);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #scene { position: fixed; inset: 0; cursor: grab; }
  #scene.dragging { cursor: grabbing; }
  #scene.hovering { cursor: pointer; }

  .vignette {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
    z-index: 5; mix-blend-mode: multiply;
  }
  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 6; opacity: 0.06;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    padding: 18px 28px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(13,11,7,0.85), transparent);
    pointer-events: none;
  }
  .brand { pointer-events: auto; display: flex; align-items: baseline; gap: 14px; }
  .brand-mark {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500;
    font-size: 28px; letter-spacing: 0.02em; color: var(--ember-bright);
    text-shadow: 0 0 20px rgba(245, 185, 122, 0.4);
  }
  .brand-sub {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-faint);
  }
  .room-label { pointer-events: auto; text-align: right; }
  .room-name {
    font-family: 'Cormorant Garamond', serif; font-size: 22px;
    letter-spacing: 0.04em; color: var(--ink);
  }
  .room-meta {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--ink-faint); margin-top: 4px;
  }

  .roomnav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    padding: 14px 24px 22px; display: flex; justify-content: center; gap: 8px;
    background: linear-gradient(to top, rgba(13,11,7,0.9), transparent);
    flex-wrap: wrap;
  }
  .roomnav-btn {
    pointer-events: auto;
    background: rgba(26,22,17,0.6);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(201,169,97,0.2);
    color: var(--ink-dim); padding: 8px 16px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .roomnav-btn:hover { color: var(--ink); border-color: rgba(201,169,97,0.5); background: rgba(40,32,22,0.8); }
  .roomnav-btn.active {
    color: var(--ember-bright); border-color: var(--ember);
    background: rgba(138,63,35,0.25); box-shadow: 0 0 24px rgba(212,130,74,0.2);
  }
  .roomnav-btn .num { color: var(--ink-faint); margin-right: 8px; }
  .roomnav-btn.active .num { color: var(--ember); }

  .locus-tip {
    position: fixed; z-index: 15; pointer-events: none;
    background: rgba(13,11,7,0.92); border: 1px solid rgba(201,169,97,0.35);
    padding: 10px 14px; max-width: 260px;
    opacity: 0; transition: opacity 0.18s ease;
    transform: translate(-50%, -110%);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .locus-tip.show { opacity: 1; }
  .locus-tip-title {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 17px; color: var(--ember-bright); margin-bottom: 4px;
  }
  .locus-tip-body {
    font-family: 'Cormorant Garamond', serif; font-size: 14px;
    color: var(--ink-dim); line-height: 1.4;
  }
  .locus-tip-hint {
    font-family: 'JetBrains Mono', monospace; font-size: 8px;
    letter-spacing: 0.25em; color: var(--ink-faint);
    margin-top: 8px; text-transform: uppercase;
  }

  .modal-backdrop {
    position: fixed; inset: 0; z-index: 30;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--paper); border: 1px solid rgba(201,169,97,0.3);
    width: 100%; max-width: 520px; padding: 32px 36px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7); position: relative;
  }
  .modal::before {
    content: ''; position: absolute; top: 12px; left: 12px; right: 12px; bottom: 12px;
    border: 1px solid rgba(201,169,97,0.12); pointer-events: none;
  }
  .modal-header {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ember); margin-bottom: 6px;
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif; font-size: 28px; font-style: italic;
    color: var(--ink); margin-bottom: 22px; line-height: 1.1;
  }
  .field { margin-bottom: 18px; }
  .field label {
    display: block; font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 6px;
  }
  .field input, .field textarea {
    width: 100%; background: var(--paper-deep);
    border: 1px solid rgba(201,169,97,0.2); color: var(--ink);
    padding: 10px 12px; font-family: 'Cormorant Garamond', serif;
    font-size: 17px; outline: none; transition: border-color 0.2s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--ember); }
  .field textarea { min-height: 90px; resize: vertical; line-height: 1.45; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .btn {
    background: transparent; border: 1px solid rgba(201,169,97,0.3);
    color: var(--ink-dim); padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.25em; text-transform: uppercase;
    cursor: pointer; transition: all 0.25s;
  }
  .btn:hover { color: var(--ink); border-color: var(--gold); }
  .btn-primary { background: var(--rust); border-color: var(--ember); color: var(--ember-bright); }
  .btn-primary:hover { background: var(--ember); color: var(--paper); }
  .btn-danger { color: var(--ink-faint); border-color: rgba(255,80,80,0.15); }
  .btn-danger:hover { color: #ff8a6e; border-color: rgba(255,80,80,0.5); }

  .intro {
    position: fixed; inset: 0; z-index: 40;
    background: var(--paper-deep);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 1.2s ease, visibility 1.2s;
    text-align: center; padding: 20px;
  }
  .intro.hide { opacity: 0; visibility: hidden; }
  .intro-mark {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 64px; color: var(--ember-bright); margin-bottom: 4px;
    text-shadow: 0 0 40px rgba(245,185,122,0.5);
    animation: glow 3s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { text-shadow: 0 0 40px rgba(245,185,122,0.4); }
    50% { text-shadow: 0 0 60px rgba(245,185,122,0.7); }
  }
  .intro-sub {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 36px;
  }
  .intro-enter {
    background: transparent; border: 1px solid var(--ember);
    color: var(--ember-bright); padding: 12px 32px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.3em; text-transform: uppercase;
    cursor: pointer; transition: all 0.4s;
  }
  .intro-enter:hover { background: var(--rust); box-shadow: 0 0 30px rgba(212,130,74,0.4); }
  .intro-hint {
    margin-top: 32px; font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 15px; color: var(--ink-faint);
    max-width: 380px; line-height: 1.5;
  }

  @media (max-width: 640px) {
    .topbar { padding: 14px 16px; }
    .brand-mark { font-size: 22px; }
    .room-name { font-size: 17px; }
    .roomnav { padding: 10px 12px 18px; gap: 6px; }
    .roomnav-btn { padding: 7px 11px; font-size: 9px; letter-spacing: 0.15em; }
    .intro-mark { font-size: 44px; }
    .modal { padding: 24px 22px; }
    .modal-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="intro" id="intro">
  <div class="intro-mark">Memoria</div>
  <div class="intro-sub">A Palace for Remembering</div>
  <button class="intro-enter" id="introEnter">Enter the Palace</button>
  <div class="intro-hint">
    Click the glowing floor markers to move between viewpoints.<br>
    Click a wall-orb to inscribe a memory.<br>
    Drag to look around.
  </div>
</div>

<canvas id="scene"></canvas>
<div class="vignette"></div>
<div class="grain"></div>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">Memoria</div>
    <div class="brand-sub">Mind Palace</div>
  </div>
  <div class="room-label">
    <div class="room-name" id="roomName">—</div>
    <div class="room-meta" id="roomMeta">—</div>
  </div>
</div>

<div class="roomnav" id="roomnav"></div>

<div class="locus-tip" id="locusTip">
  <div class="locus-tip-title" id="tipTitle"></div>
  <div class="locus-tip-body" id="tipBody"></div>
  <div class="locus-tip-hint">click to edit</div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-header" id="modalLocusId">LOCUS · 00</div>
    <div class="modal-title">Inscribe a Memory</div>
    <div class="field">
      <label>Title / Keyword</label>
      <input type="text" id="fieldTitle" placeholder="e.g. Operant Conditioning" autocomplete="off" />
    </div>
    <div class="field">
      <label>Memory / Mnemonic</label>
      <textarea id="fieldBody" placeholder="The vivid image or fact you want to anchor here..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btnClear">Clear</button>
      <button class="btn" id="btnCancel">Cancel</button>
      <button class="btn btn-primary" id="btnSave">Inscribe</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

const ROOMS = [
  { id: 'study', name: "The Scholar's Study", meta: 'Behavior · Sensation · Perception',
    palette: { wall: 0x3a2d1f, floor: 0x1a120a, accent: 0x8a3f23, light: 0xf5b97a } },
  { id: 'chapel', name: 'The Memory Chapel', meta: 'Learning · Memory · Cognition',
    palette: { wall: 0x2a2438, floor: 0x14101c, accent: 0x6b4a8f, light: 0xb8a6e8 } },
  { id: 'observatory', name: 'The Observatory', meta: 'Identity · Social · Personality',
    palette: { wall: 0x1a2a3a, floor: 0x0a141f, accent: 0x3a6e8f, light: 0x9ccfe8 } },
  { id: 'apothecary', name: 'The Apothecary', meta: 'Stress · Emotion · Motivation',
    palette: { wall: 0x2a3a28, floor: 0x141a10, accent: 0x6a8a3a, light: 0xc8e89c } },
  { id: 'archive', name: 'The Archive', meta: 'Society · Demography · Disparities',
    palette: { wall: 0x3a2a28, floor: 0x1a1010, accent: 0x8f5a3a, light: 0xe8b89c } },
];

const STORAGE_KEY = 'memoria_v1';
function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return {};
}
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {} }
let palaceData = loadData();
function getLocus(roomId, locusId) { return (palaceData[roomId] && palaceData[roomId][locusId]) || { title:'', body:'' }; }
function setLocus(roomId, locusId, data) {
  if (!palaceData[roomId]) palaceData[roomId] = {};
  if (!data.title && !data.body) delete palaceData[roomId][locusId];
  else palaceData[roomId][locusId] = data;
  saveData(palaceData);
}

const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0805);
scene.fog = new THREE.FogExp2(0x0a0805, 0.06);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 0);

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

let currentRoomIdx = 0;
let currentViewpointIdx = 0;
let roomObjects = [];
let locusMarkers = [];
let viewpointMarkers = [];
let hoveredObject = null;
let camAnim = null;

function clearRoom() {
  for (const obj of roomObjects) {
    scene.remove(obj);
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
      else obj.material.dispose();
    }
  }
  roomObjects = []; locusMarkers = []; viewpointMarkers = [];
}
function addObj(mesh) { scene.add(mesh); roomObjects.push(mesh); return mesh; }

function makeNoiseTexture(baseColor, variance = 0.15) {
  const size = 256;
  const c = document.createElement('canvas'); c.width = c.height = size;
  const ctx = c.getContext('2d');
  const base = new THREE.Color(baseColor);
  const img = ctx.createImageData(size, size);
  for (let i = 0; i < img.data.length; i += 4) {
    const n = (Math.random() - 0.5) * variance;
    img.data[i] = Math.max(0, Math.min(255, (base.r + n) * 255));
    img.data[i+1] = Math.max(0, Math.min(255, (base.g + n) * 255));
    img.data[i+2] = Math.max(0, Math.min(255, (base.b + n) * 255));
    img.data[i+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(4, 4);
  return tex;
}

function buildRoom(roomIdx) {
  clearRoom();
  const room = ROOMS[roomIdx];
  const p = room.palette;
  const W = 12, D = 12, H = 5;

  const floorMat = new THREE.MeshStandardMaterial({
    color: p.floor, roughness: 0.85, metalness: 0.05,
    map: makeNoiseTexture(p.floor, 0.08),
  });
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(W, D), floorMat);
  floor.rotation.x = -Math.PI / 2;
  addObj(floor);

  const ceilMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(p.wall).multiplyScalar(0.4), roughness: 1.0,
  });
  const ceil = new THREE.Mesh(new THREE.PlaneGeometry(W, D), ceilMat);
  ceil.rotation.x = Math.PI / 2; ceil.position.y = H;
  addObj(ceil);

  const wallMat = new THREE.MeshStandardMaterial({
    color: p.wall, roughness: 0.92, map: makeNoiseTexture(p.wall, 0.12),
  });
  const wallGeo = new THREE.PlaneGeometry(W, H);
  const walls = [
    { pos: [0, H/2, -D/2], rot: [0, 0, 0] },
    { pos: [0, H/2, D/2], rot: [0, Math.PI, 0] },
    { pos: [-W/2, H/2, 0], rot: [0, Math.PI/2, 0] },
    { pos: [W/2, H/2, 0], rot: [0, -Math.PI/2, 0] },
  ];
  walls.forEach(w => {
    const m = new THREE.Mesh(wallGeo, wallMat);
    m.position.set(...w.pos); m.rotation.set(...w.rot);
    addObj(m);
  });

  const wainMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(p.accent).multiplyScalar(0.5), roughness: 0.6,
  });
  walls.forEach(w => {
    const strip = new THREE.Mesh(new THREE.BoxGeometry(W, 0.9, 0.08), wainMat);
    strip.position.set(w.pos[0], 0.45, w.pos[2]);
    strip.rotation.set(0, w.rot[1], 0);
    const off = 0.02;
    if (w.pos[2] !== 0) strip.position.z = w.pos[2] - Math.sign(w.pos[2]) * off;
    if (w.pos[0] !== 0) strip.position.x = w.pos[0] - Math.sign(w.pos[0]) * off;
    addObj(strip);
  });

  buildCenterpiece(roomIdx, p);

  addObj(new THREE.AmbientLight(0xffffff, 0.12));
  const centerLight = new THREE.PointLight(p.light, 2.2, 14, 1.6);
  centerLight.position.set(0, 2.2, 0);
  addObj(centerLight);
  const fillLight = new THREE.PointLight(p.light, 0.6, 10, 2);
  fillLight.position.set(-3, 3.5, -3);
  addObj(fillLight);

  buildLoci(room, W, D, H, p);
  buildViewpoints(p);
}

function buildCenterpiece(roomIdx, p) {
  const pedMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(p.accent).multiplyScalar(0.7),
    roughness: 0.5, metalness: 0.3,
  });
  const ped = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.75, 1.2, 8), pedMat);
  ped.position.y = 0.6; addObj(ped);

  const itemMat = new THREE.MeshStandardMaterial({
    color: p.light, emissive: p.light, emissiveIntensity: 0.4,
    roughness: 0.3, metalness: 0.6,
  });
  let item;
  if (roomIdx === 0) { item = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.08, 0.5), itemMat); item.position.y = 1.26; }
  else if (roomIdx === 1) { item = new THREE.Mesh(new THREE.SphereGeometry(0.3, 24, 16), itemMat); item.position.y = 1.55; }
  else if (roomIdx === 2) { item = new THREE.Mesh(new THREE.TorusGeometry(0.32, 0.04, 12, 32), itemMat); item.position.y = 1.5; item.rotation.x = Math.PI/3; }
  else if (roomIdx === 3) { item = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.22, 0.32, 16), itemMat); item.position.y = 1.4; }
  else { item = new THREE.Mesh(new THREE.ConeGeometry(0.32, 0.5, 4), itemMat); item.position.y = 1.5; }
  item.userData.spin = true;
  addObj(item);

  const itemLight = new THREE.PointLight(p.light, 1.2, 4, 2);
  itemLight.position.set(0, 1.6, 0);
  addObj(itemLight);
}

function buildLoci(room, W, D, H, p) {
  const positions = [
    { x: -2.5, z: -D/2 + 0.4, ry: 0 },
    { x:  2.5, z: -D/2 + 0.4, ry: 0 },
    { x: -W/2 + 0.4, z: -2.5, ry: Math.PI/2 },
    { x: -W/2 + 0.4, z:  2.5, ry: Math.PI/2 },
    { x:  W/2 - 0.4, z: -2.5, ry: -Math.PI/2 },
    { x:  W/2 - 0.4, z:  2.5, ry: -Math.PI/2 },
  ];

  positions.forEach((pos, i) => {
    const locusId = `${i+1}`;
    const stored = getLocus(room.id, locusId);
    const hasMemory = !!(stored.title || stored.body);

    const alcoveMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(p.wall).multiplyScalar(0.5), roughness: 0.9,
    });
    const alcove = new THREE.Mesh(new THREE.PlaneGeometry(1.1, 1.8), alcoveMat);
    alcove.position.set(pos.x, 1.5, pos.z);
    alcove.rotation.y = pos.ry + Math.PI;
    alcove.position.x += Math.sin(pos.ry) * 0.01;
    alcove.position.z += Math.cos(pos.ry) * 0.01;
    addObj(alcove);

    const subPedMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(p.accent).multiplyScalar(0.55), roughness: 0.6,
    });
    const subPed = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.4), subPedMat);
    subPed.position.set(pos.x, 0.35, pos.z);
    subPed.position.x -= Math.sin(pos.ry) * 0.2;
    subPed.position.z -= Math.cos(pos.ry) * 0.2;
    addObj(subPed);

    const color = hasMemory ? p.light : new THREE.Color(p.light).multiplyScalar(0.55).getHex();
    const orbMat = new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: hasMemory ? 1.4 : 0.5,
      transparent: true, opacity: 0.95,
    });
    const orb = new THREE.Mesh(new THREE.SphereGeometry(0.13, 24, 16), orbMat);
    orb.position.set(pos.x, 0.92, pos.z);
    orb.position.x -= Math.sin(pos.ry) * 0.2;
    orb.position.z -= Math.cos(pos.ry) * 0.2;
    orb.userData = {
      type: 'locus', locusId,
      basePos: orb.position.clone(),
      hasMemory, baseEmissive: hasMemory ? 1.4 : 0.5,
    };
    addObj(orb);
    locusMarkers.push(orb);

    const haloMat = new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: hasMemory ? 0.25 : 0.1, side: THREE.DoubleSide,
    });
    const halo = new THREE.Mesh(new THREE.RingGeometry(0.16, 0.28, 24), haloMat);
    halo.position.copy(orb.position);
    halo.userData.isHalo = true; halo.userData.followOrb = orb;
    addObj(halo);

    if (hasMemory) {
      const lt = new THREE.PointLight(color, 0.4, 2.5, 2);
      lt.position.copy(orb.position);
      addObj(lt);
    }
  });
}

function buildViewpoints(p) {
  const r = 3.5;
  const positions = [
    { x: 0, z: r }, { x: r, z: 0 }, { x: 0, z: -r }, { x: -r, z: 0 },
  ];
  positions.forEach((pos, i) => {
    if (i === currentViewpointIdx) return;
    const discMat = new THREE.MeshBasicMaterial({
      color: p.light, transparent: true, opacity: 0.25, side: THREE.DoubleSide,
    });
    const disc = new THREE.Mesh(new THREE.RingGeometry(0.18, 0.32, 24), discMat);
    disc.rotation.x = -Math.PI / 2;
    disc.position.set(pos.x, 0.02, pos.z);
    disc.userData = { type: 'viewpoint', viewpointIdx: i, isVpMarker: true };
    addObj(disc);
    viewpointMarkers.push(disc);

    const dotMat = new THREE.MeshBasicMaterial({ color: p.light, transparent: true, opacity: 0.55 });
    const dot = new THREE.Mesh(new THREE.CircleGeometry(0.08, 16), dotMat);
    dot.rotation.x = -Math.PI / 2;
    dot.position.set(pos.x, 0.025, pos.z);
    dot.userData.isVpMarker = true;
    addObj(dot);
  });
}

function getViewpointPositions() {
  const r = 3.5;
  return [
    { pos: new THREE.Vector3(0, 1.6, r), look: new THREE.Vector3(0, 1.6, 0) },
    { pos: new THREE.Vector3(r, 1.6, 0), look: new THREE.Vector3(0, 1.6, 0) },
    { pos: new THREE.Vector3(0, 1.6, -r), look: new THREE.Vector3(0, 1.6, 0) },
    { pos: new THREE.Vector3(-r, 1.6, 0), look: new THREE.Vector3(0, 1.6, 0) },
  ];
}

function getCameraLookAt() {
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  return camera.position.clone().add(dir.multiplyScalar(3));
}

function setViewpoint(idx, animate = true) {
  const vps = getViewpointPositions();
  const target = vps[idx];
  currentViewpointIdx = idx;
  rebuildViewpointMarkers();

  if (!animate) {
    camera.position.copy(target.pos);
    camera.lookAt(target.look);
    return;
  }
  camAnim = {
    fromPos: camera.position.clone(),
    toPos: target.pos.clone(),
    fromLook: getCameraLookAt(),
    toLook: target.look.clone(),
    t: 0, duration: 0.9,
  };
}

function rebuildViewpointMarkers() {
  const toRemove = roomObjects.filter(o => o.userData && o.userData.isVpMarker);
  toRemove.forEach(o => {
    scene.remove(o);
    if (o.geometry) o.geometry.dispose();
    if (o.material) o.material.dispose();
    const i = roomObjects.indexOf(o); if (i >= 0) roomObjects.splice(i, 1);
  });
  viewpointMarkers = [];
  buildViewpoints(ROOMS[currentRoomIdx].palette);
}

function gotoRoom(idx) {
  currentRoomIdx = idx;
  currentViewpointIdx = 0;
  buildRoom(idx);
  setViewpoint(0, false);
  updateRoomUI();
  updateRoomNav();
}

function updateRoomUI() {
  const room = ROOMS[currentRoomIdx];
  document.getElementById('roomName').textContent = room.name;
  document.getElementById('roomMeta').textContent = room.meta;
}

function updateRoomNav() {
  const nav = document.getElementById('roomnav');
  nav.innerHTML = '';
  ROOMS.forEach((room, i) => {
    const btn = document.createElement('button');
    btn.className = 'roomnav-btn' + (i === currentRoomIdx ? ' active' : '');
    btn.innerHTML = `<span class="num">${String(i+1).padStart(2,'0')}</span>${room.name.replace('The ','')}`;
    btn.onclick = () => { if (i !== currentRoomIdx) gotoRoom(i); };
    nav.appendChild(btn);
  });
}

let isDragging = false;
let dragStart = { x: 0, y: 0 };
let baseYaw = 0, basePitch = 0;

function onPointerDown(e) {
  const pt = e.touches ? e.touches[0] : e;
  isDragging = true;
  dragStart.x = pt.clientX; dragStart.y = pt.clientY;
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  baseYaw = Math.atan2(dir.x, dir.z);
  basePitch = Math.asin(Math.max(-1, Math.min(1, dir.y)));
  canvas.classList.add('dragging');
  hideTip();
}

function onPointerMove(e) {
  const pt = e.touches ? e.touches[0] : e;
  pointer.x = (pt.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(pt.clientY / window.innerHeight) * 2 + 1;

  if (isDragging) {
    const dx = pt.clientX - dragStart.x;
    const dy = pt.clientY - dragStart.y;
    const s = 0.005;
    const yaw = baseYaw - dx * s;
    const pitch = Math.max(-0.6, Math.min(0.6, basePitch + dy * s));
    const lookDir = new THREE.Vector3(
      Math.sin(yaw) * Math.cos(pitch),
      Math.sin(pitch),
      Math.cos(yaw) * Math.cos(pitch)
    );
    const target = camera.position.clone().add(lookDir);
    camera.lookAt(target);
  } else {
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects([...locusMarkers, ...viewpointMarkers], false);
    if (hits.length > 0) {
      const obj = hits[0].object;
      if (obj !== hoveredObject) {
        hoveredObject = obj;
        canvas.classList.add('hovering');
        if (obj.userData.type === 'locus') showLocusTip(obj, pt.clientX, pt.clientY);
      } else if (obj.userData.type === 'locus') {
        positionTip(pt.clientX, pt.clientY);
      }
    } else {
      if (hoveredObject) {
        hoveredObject = null;
        canvas.classList.remove('hovering');
        hideTip();
      }
    }
  }
}

function onPointerUp(e) {
  const wasDragging = isDragging;
  isDragging = false;
  canvas.classList.remove('dragging');
  const pt = e.changedTouches ? e.changedTouches[0] : e;
  if (wasDragging) {
    const dx = pt.clientX - dragStart.x;
    const dy = pt.clientY - dragStart.y;
    if (Math.abs(dx) < 5 && Math.abs(dy) < 5) handleClick(pt);
  }
}

function handleClick(pt) {
  pointer.x = (pt.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(pt.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects([...locusMarkers, ...viewpointMarkers], false);
  if (hits.length > 0) {
    const obj = hits[0].object;
    if (obj.userData.type === 'viewpoint') setViewpoint(obj.userData.viewpointIdx, true);
    else if (obj.userData.type === 'locus') openLocusEditor(obj.userData.locusId);
  }
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: true });
canvas.addEventListener('touchmove', onPointerMove, { passive: true });
canvas.addEventListener('touchend', onPointerUp);

const tip = document.getElementById('locusTip');
function showLocusTip(orb, x, y) {
  const room = ROOMS[currentRoomIdx];
  const data = getLocus(room.id, orb.userData.locusId);
  document.getElementById('tipTitle').textContent =
    data.title || `Locus ${String(orb.userData.locusId).padStart(2,'0')} · empty`;
  document.getElementById('tipBody').textContent =
    data.body || 'No memory inscribed yet.';
  positionTip(x, y);
  tip.classList.add('show');
}
function positionTip(x, y) { tip.style.left = x + 'px'; tip.style.top = (y - 20) + 'px'; }
function hideTip() { tip.classList.remove('show'); }

const modal = document.getElementById('modalBackdrop');
let editingLocus = null;
function openLocusEditor(locusId) {
  editingLocus = locusId;
  const room = ROOMS[currentRoomIdx];
  const data = getLocus(room.id, locusId);
  document.getElementById('modalLocusId').textContent =
    `${room.name.toUpperCase()} · LOCUS ${String(locusId).padStart(2,'0')}`;
  document.getElementById('fieldTitle').value = data.title || '';
  document.getElementById('fieldBody').value = data.body || '';
  modal.classList.add('show');
  setTimeout(() => document.getElementById('fieldTitle').focus(), 50);
}
function closeLocusEditor() { modal.classList.remove('show'); editingLocus = null; }

document.getElementById('btnSave').onclick = () => {
  if (!editingLocus) return;
  const room = ROOMS[currentRoomIdx];
  const data = {
    title: document.getElementById('fieldTitle').value.trim(),
    body: document.getElementById('fieldBody').value.trim(),
  };
  setLocus(room.id, editingLocus, data);
  closeLocusEditor();
  const vp = currentViewpointIdx;
  buildRoom(currentRoomIdx);
  setViewpoint(vp, false);
};
document.getElementById('btnCancel').onclick = closeLocusEditor;
document.getElementById('btnClear').onclick = () => {
  document.getElementById('fieldTitle').value = '';
  document.getElementById('fieldBody').value = '';
};
modal.addEventListener('click', e => { if (e.target === modal) closeLocusEditor(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && modal.classList.contains('show')) closeLocusEditor();
});

document.getElementById('introEnter').onclick = () => {
  document.getElementById('intro').classList.add('hide');
};

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  if (camAnim) {
    camAnim.t += dt / camAnim.duration;
    const k = Math.min(1, camAnim.t);
    const e = k * k * (3 - 2 * k);
    camera.position.lerpVectors(camAnim.fromPos, camAnim.toPos, e);
    const look = new THREE.Vector3().lerpVectors(camAnim.fromLook, camAnim.toLook, e);
    camera.lookAt(look);
    if (k >= 1) camAnim = null;
  }

  for (const orb of locusMarkers) {
    const phase = orb.userData.basePos.x * 0.7 + orb.userData.basePos.z * 0.5;
    orb.position.y = orb.userData.basePos.y + Math.sin(t * 1.5 + phase) * 0.04;
    if (orb.material.emissive) {
      orb.material.emissiveIntensity = orb.userData.baseEmissive + Math.sin(t * 2 + phase) * 0.15;
    }
  }

  for (const obj of roomObjects) {
    if (obj.userData && obj.userData.isHalo && obj.userData.followOrb) {
      obj.position.copy(obj.userData.followOrb.position);
      obj.lookAt(camera.position);
    }
    if (obj.userData && obj.userData.spin) obj.rotation.y += dt * 0.3;
  }

  for (const vp of viewpointMarkers) {
    const s = 1 + Math.sin(t * 2.5) * 0.12;
    vp.scale.setScalar(s);
    vp.material.opacity = 0.2 + Math.sin(t * 2.5) * 0.1;
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

gotoRoom(0);
animate();
</script>
</body>
